<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F4EF"/>
      <stop offset="1" stop-color="#E6F2F4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark, centered-left composition -->
  <g transform="translate(140,170)">
    <svg viewBox="0 0 40 40" width="160" height="160">
      <path d="M 4 32 Q 20 23, 36 32" stroke="#0B5563" stroke-width="1.8" stroke-linecap="round" opacity="0.42" fill="none"/>
      <path d="M 4 27 Q 20 15, 36 27" stroke="#0B5563" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <circle cx="20" cy="16" r="5" fill="#0B5563"/>
    </svg>
  </g>

  <!-- Wordmark -->
  <text x="140" y="400"
        font-family="Fraunces, Georgia, serif"
        font-size="128" font-weight="700"
        fill="#0B5563" letter-spacing="-3">Habterra</text>

  <!-- Tagline -->
  <text x="140" y="460"
        font-family="Fraunces, Georgia, serif"
        font-size="38" font-style="italic" font-weight="300"
        fill="#6B7785" letter-spacing="0.5">Find your footing.</text>

  <!-- Sub-line -->
  <text x="140" y="530"
        font-family="Inter, sans-serif"
        font-size="22" font-weight="400"
        fill="#3A3C3E">Professional development for international school teachers</text>

  <!-- Decorative corner horizon, subtle -->
  <path d="M 700 540 Q 950 470, 1160 540"
        stroke="#0B5563" stroke-width="2" opacity="0.12" fill="none" stroke-linecap="round"/>
  <path d="M 700 480 Q 950 400, 1160 480"
        stroke="#0B5563" stroke-width="2" opacity="0.08" fill="none" stroke-linecap="round"/>
</svg>
