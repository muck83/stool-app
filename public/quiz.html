<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* stool brand palette */
    --teal: #1D9E75;
    --teal-dark: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --gold: #BA7517;
    --gold-light: #FAEEDA;

    /* quiz dark theme (builds on stool ink colors) */
    --bg: #111110;
    --surface: #1a1917;
    --surface-2: #232320;
    --border: #2e2e2a;
    --ink: #f0f0e8;
    --ink-2: #b8b8ae;
    --ink-3: #7e7e76;
    --ink-4: #5a5a54;

    --red: #D85A30;
    --red-bg: rgba(216,90,48,.1);
    --teal-bright: #7EC8B0;
    --teal-bg: rgba(29,158,117,.12);
    --purple-bright: #9B93E0;
    --purple-bg: rgba(83,74,183,.12);
    --gold-bright: #D4A843;
    --gold-bg: rgba(186,117,23,.12);

    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --r: 10px;
    --rl: 14px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 1.5rem 1rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .quiz-container {
    width: 100%;
    max-width: 540px;
  }

  /* ── Stool logo (inline SVG) ── */
  .stool-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .6rem;
    margin-bottom: 1.5rem;
  }
  .stool-logo svg { flex-shrink: 0; }
  .stool-logo .wordmark {
    font-family: var(--serif);
    font-size: 1.15rem;
    color: var(--ink);
    letter-spacing: -.01em;
  }

  /* ── Start screen ── */
  .start-screen {
    text-align: center;
    padding: 2rem 1rem 3rem;
  }
  .start-screen h1 {
    font-family: var(--serif);
    font-size: 2rem;
    line-height: 1.25;
    margin-bottom: .6rem;
    color: var(--ink);
  }
  .start-screen .subtitle {
    font-size: 1rem;
    color: var(--ink-2);
    margin-bottom: .3rem;
  }
  .start-screen .hook {
    font-size: .85rem;
    color: var(--ink-3);
    margin-bottom: 2rem;
  }
  .start-screen .leg-dots {
    display: flex;
    justify-content: center;
    gap: .5rem;
    margin-bottom: 1.5rem;
  }
  .start-screen .leg-dots span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── Buttons ── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .85rem 2rem;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 600;
    color: white;
    background: var(--teal);
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-primary:active { transform: scale(.97); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .4rem;
    padding: .65rem 1.5rem;
    font-family: var(--sans);
    font-size: .85rem;
    font-weight: 600;
    color: var(--teal-bright);
    background: var(--teal-bg);
    border: 1px solid rgba(29,158,117,.25);
    border-radius: var(--r);
    cursor: pointer;
    transition: background .2s;
  }
  .btn-secondary:hover { background: rgba(29,158,117,.2); }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    padding: .5rem 1rem;
    font-family: var(--sans);
    font-size: .8rem;
    font-weight: 500;
    color: var(--ink-3);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--r);
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
  }
  .btn-ghost:hover { color: var(--ink-2); border-color: var(--ink-3); }

  /* ── Progress bar (three-leg gradient) ── */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--purple), var(--gold));
    border-radius: 2px;
    transition: width .4s ease;
  }

  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .75rem;
  }
  .question-counter {
    font-size: .75rem;
    font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .score-live {
    font-size: .75rem;
    font-weight: 600;
    color: var(--teal-bright);
    letter-spacing: .05em;
  }

  /* ── Question card ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--rl);
    padding: 1.5rem;
    animation: fadeUp .35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-text {
    font-family: var(--serif);
    font-size: 1.15rem;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 1.25rem;
  }

  .answer-buttons {
    display: flex;
    gap: .6rem;
  }

  .answer-btn {
    flex: 1;
    padding: .75rem;
    font-family: var(--sans);
    font-size: .95rem;
    font-weight: 600;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .2s;
    border: 1.5px solid var(--border);
    background: var(--surface-2);
    color: var(--ink);
  }
  .answer-btn:hover { border-color: var(--purple); background: var(--purple-bg); }
  .answer-btn.correct {
    border-color: var(--teal);
    background: var(--teal-bg);
    color: var(--teal-bright);
  }
  .answer-btn.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    color: var(--red);
  }
  .answer-btn.faded {
    opacity: .35;
    pointer-events: none;
  }

  /* ── Reveal panel ── */
  .reveal {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    animation: fadeUp .3s ease;
  }
  .reveal-verdict {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-size: .85rem;
    font-weight: 700;
    margin-bottom: .5rem;
  }
  .reveal-verdict.correct { color: var(--teal-bright); }
  .reveal-verdict.wrong { color: var(--red); }
  .reveal-explanation {
    font-size: .85rem;
    color: var(--ink-2);
    line-height: 1.65;
    margin-bottom: .5rem;
  }
  .reveal-cite {
    font-size: .72rem;
    color: var(--ink-4);
    font-style: italic;
    margin-bottom: 1rem;
  }
  .next-row {
    display: flex;
    justify-content: flex-end;
  }

  /* ── Results screen ── */
  .results-screen {
    text-align: center;
    animation: fadeUp .4s ease;
  }
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--rl);
    padding: 2rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .score-ring {
    width: 130px; height: 130px;
    margin: 0 auto 1.25rem;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .track { fill: none; stroke: var(--surface-2); stroke-width: 7; }
  .score-ring .fill-ring { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1.2s ease; }
  .score-number {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-number .big { font-size: 2.2rem; font-weight: 700; font-family: var(--serif); }
  .score-number .label { font-size: .7rem; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; }

  .result-title {
    font-family: var(--serif);
    font-size: 1.4rem;
    margin-bottom: .4rem;
  }
  .result-desc {
    font-size: .88rem;
    color: var(--ink-2);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── CTA block with stool branding ── */
  .cta-block {
    background: linear-gradient(135deg, rgba(29,158,117,.06), rgba(83,74,183,.06), rgba(186,117,23,.06));
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .cta-block .cta-stool-icon {
    display: flex;
    justify-content: center;
    margin-bottom: .75rem;
  }
  .cta-block .cta-text {
    font-size: .85rem;
    color: var(--ink-2);
    margin-bottom: .85rem;
    line-height: 1.55;
  }
  .cta-block .cta-features {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .cta-block .cta-feature {
    display: flex;
    align-items: center;
    gap: .3rem;
    font-size: .72rem;
    color: var(--ink-3);
  }
  .cta-block .cta-feature .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .share-row {
    display: flex;
    gap: .5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: .75rem;
  }

  .branding {
    margin-top: 2rem;
    padding-top: .75rem;
    font-size: .72rem;
    color: var(--ink-4);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
  }
  .branding a { color: var(--teal-bright); text-decoration: none; }
  .branding a:hover { text-decoration: underline; }

  /* ── Review panel ── */
  .review-panel {
    margin-top: .75rem;
    text-align: left;
  }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: .85rem 1rem;
    margin-bottom: .5rem;
  }
  .review-item .q-text { font-size: .82rem; color: var(--ink); line-height: 1.5; margin-bottom: .35rem; }
  .review-item .q-result { font-size: .75rem; font-weight: 600; }
  .review-item .q-result.correct { color: var(--teal-bright); }
  .review-item .q-result.wrong { color: var(--red); }

  /* ── Mobile tweaks ── */
  @media (max-width: 480px) {
    .start-screen h1 { font-size: 1.6rem; }
    .question-text { font-size: 1.05rem; }
    .results-card { padding: 1.5rem 1rem; }
    .cta-block .cta-features { gap: .6rem; }
  }
</style>
</head>
<body>

<div class="quiz-container" id="app"></div>

<script>
(function() {

  // ── The stool SVG (matches site favicon/logo) ─────────────────────────
  const STOOL_SVG_SM = `<svg width="28" height="30" viewBox="0 0 80 84" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="19" y1="22" x2="7" y2="74" stroke="#1D9E75" stroke-width="8" stroke-linecap="round"/>
    <line x1="40" y1="24" x2="40" y2="76" stroke="#534AB7" stroke-width="8" stroke-linecap="round"/>
    <line x1="61" y1="22" x2="73" y2="74" stroke="#BA7517" stroke-width="8" stroke-linecap="round"/>
    <rect x="7" y="13" width="66" height="17" rx="6" fill="#1a1917"/>
  </svg>`;

  const STOOL_SVG_LG = `<svg width="48" height="52" viewBox="0 0 80 84" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="19" y1="22" x2="7" y2="74" stroke="#1D9E75" stroke-width="8" stroke-linecap="round"/>
    <line x1="40" y1="24" x2="40" y2="76" stroke="#534AB7" stroke-width="8" stroke-linecap="round"/>
    <line x1="61" y1="22" x2="73" y2="74" stroke="#BA7517" stroke-width="8" stroke-linecap="round"/>
    <rect x="7" y="13" width="66" height="17" rx="6" fill="currentColor"/>
  </svg>`;

  // ── Questions ──────────────────────────────────────────────────────────
  const QUESTIONS = [
    {
      q: "When a student nods and says \"yes\" while you explain something, it usually means they understood.",
      answer: false,
      explanation: "In Korean, Chinese, Japanese, and other East Asian contexts, nodding and saying \"yes\" typically means \"I hear you\" or \"I respect you\" — not \"I understand.\" The only reliable check is to ask them to show you.",
      cite: "Cultural communication research; Hall (1976)"
    },
    {
      q: "Students who rely heavily on memorisation tend to score worse on tests of deep, critical thinking.",
      answer: false,
      explanation: "The research says the opposite. Students from East Asian school systems — where memorisation is common — consistently score among the highest globally on both recall and higher-order thinking. Memorisation is often a path to deep understanding, not a shortcut around it.",
      cite: "Watkins & Biggs (2001)"
    },
    {
      q: "A student who avoids eye contact with you is probably being disrespectful.",
      answer: false,
      explanation: "In many cultures — parts of East Asia, West Africa, and Latin America — avoiding eye contact with a teacher is a sign of respect, not defiance. Sustained eye contact with an authority figure can feel confrontational.",
      cite: "Cross-cultural communication research"
    },
    {
      q: "Finland — one of the top-ranked education systems globally — doesn't begin formal schooling until age 7.",
      answer: true,
      explanation: "Finnish children spend their early years in play-based learning before any formal instruction. Despite starting later than almost every other country, Finland consistently ranks near the top for literacy and problem-solving.",
      cite: "Finnish National Agency for Education; PISA results"
    },
    {
      q: "Waiting just 3 extra seconds after asking a question can more than double the quality of student responses.",
      answer: true,
      explanation: "Most teachers wait less than 1 second before re-asking or answering their own question. Extending this to 3–5 seconds significantly increases how many students respond, how long their answers are, and how accurate they are.",
      cite: "Rowe (1974)"
    },
    {
      q: "ADHD and autism present the same way in every culture.",
      answer: false,
      explanation: "Diagnostic tools are normed on Western populations. The same behavior that triggers a referral in London may be considered completely normal in Tokyo. Cultural expectations of \"normal\" child behavior vary enormously, meaning many neurodivergent students from non-Western backgrounds are either misdiagnosed or missed entirely.",
      cite: "Tafla et al. (2024); Neurodiversity 2.0 framework (2025)"
    },
    {
      q: "A timed written essay is a culturally neutral way to assess student understanding.",
      answer: false,
      explanation: "Timed essays reward one cultural mode: individual, rapid, linear argumentation. Students from cultures that value deliberation, oral reasoning, or collective problem-solving are being assessed on cultural fit, not understanding.",
      cite: "Frontiers in Education (2025)"
    },
    {
      q: "Most social-emotional learning programs are designed to work equally well across all cultures.",
      answer: false,
      explanation: "Most SEL programs are built on a Western model: name your feelings, express them verbally, regulate them individually. In many cultures, emotions are relational, expressed through action, and regulated collectively. A student who seems \"emotionally flat\" may just process emotions differently.",
      cite: "Where Social-Emotional Learning Meets Culture (2025)"
    },
    {
      q: "Telling an international student \"Your English is amazing!\" is always a compliment.",
      answer: false,
      explanation: "While the intent is kind, it communicates surprise that someone from their background could be articulate — reinforcing the assumption that English proficiency is unexpected. Students report that being repeatedly \"complimented\" on their English makes them feel like permanent outsiders.",
      cite: "Sue et al. (2007); Journal of Higher Education (2025)"
    },
    {
      q: "The teacher's relationship with a student predicts learning outcomes more strongly than any specific teaching method.",
      answer: true,
      explanation: "Across thousands of studies, teacher-student relationship quality is one of the strongest predictors of achievement — stronger than class size, technology, or curriculum. This holds across every country studied.",
      cite: "Hattie (2009), Visible Learning"
    }
  ];

  // ── Helpers ────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let questions = shuffle(QUESTIONS);
  let current = 0;
  let score = 0;
  let answered = null;
  let results = [];

  const SITE_URL = "https://mystool.org";
  const QUIZ_URL = "https://mystool.org/quiz";
  const app = document.getElementById("app");

  // ── Render: Start ─────────────────────────────────────────────────────
  function renderStart() {
    app.innerHTML = `
      <div class="start-screen">
        <div class="stool-logo">
          ${STOOL_SVG_LG}
          <span class="wordmark">stool</span>
        </div>
        <h1>How well do you<br>know culture?</h1>
        <p class="subtitle">10 questions. 2 minutes.</p>
        <p class="hook">Most teachers get fewer than half right.</p>
        <div class="leg-dots">
          <span style="background:#1D9E75"></span>
          <span style="background:#534AB7"></span>
          <span style="background:#BA7517"></span>
        </div>
        <button class="btn-primary" id="startBtn">Start the quiz &rarr;</button>
        <div class="branding">
          ${STOOL_SVG_SM}
          <span>Honest intelligence for international educators &middot; <a href="${SITE_URL}" target="_blank">mystool.org</a></span>
        </div>
      </div>
    `;
    document.getElementById("startBtn").addEventListener("click", () => {
      current = 0; score = 0; answered = null; results = [];
      questions = shuffle(QUESTIONS);
      renderQuestion();
    });
  }

  // ── Render: Question ──────────────────────────────────────────────────
  function renderQuestion() {
    const q = questions[current];
    const pct = ((current) / questions.length) * 100;

    app.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question-header">
        <div class="question-counter">Question ${current + 1} of ${questions.length}</div>
        <div class="score-live">${score}/${current} correct</div>
      </div>
      <div class="question-card">
        <div class="question-text">${q.q}</div>
        <div class="answer-buttons">
          <button class="answer-btn" id="btnTrue">True</button>
          <button class="answer-btn" id="btnFalse">False</button>
        </div>
        <div id="reveal"></div>
      </div>
    `;

    document.getElementById("btnTrue").addEventListener("click", () => handleAnswer(true));
    document.getElementById("btnFalse").addEventListener("click", () => handleAnswer(false));
  }

  // ── Handle answer ─────────────────────────────────────────────────────
  function handleAnswer(val) {
    if (answered !== null) return;
    answered = val;
    const q = questions[current];
    const isCorrect = val === q.answer;
    if (isCorrect) score++;
    results.push({ correct: isCorrect, question: q.q });

    const btnTrue = document.getElementById("btnTrue");
    const btnFalse = document.getElementById("btnFalse");

    if (q.answer === true) {
      btnTrue.classList.add("correct");
      if (!isCorrect) btnFalse.classList.add("wrong");
    } else {
      btnFalse.classList.add("correct");
      if (!isCorrect) btnTrue.classList.add("wrong");
    }
    if (val === true) btnFalse.classList.add("faded");
    else btnTrue.classList.add("faded");

    // Update live score
    document.querySelector(".score-live").textContent = score + "/" + (current + 1) + " correct";

    const reveal = document.getElementById("reveal");
    const isLast = current >= questions.length - 1;
    reveal.innerHTML = `
      <div class="reveal">
        <div class="reveal-verdict ${isCorrect ? 'correct' : 'wrong'}">
          ${isCorrect ? '✓ Correct' : '✗ The answer is ' + (q.answer ? 'True' : 'False')}
        </div>
        <div class="reveal-explanation">${q.explanation}</div>
        <div class="reveal-cite">${q.cite}</div>
        <div class="next-row">
          <button class="btn-secondary" id="nextBtn">
            ${isLast ? 'See your results →' : 'Next question →'}
          </button>
        </div>
      </div>
    `;
    document.getElementById("nextBtn").addEventListener("click", () => {
      answered = null;
      current++;
      if (current >= questions.length) renderResults();
      else renderQuestion();
    });
  }

  // ── Result tiers ──────────────────────────────────────────────────────
  function getResultTier(s) {
    if (s >= 9) return { title: "Cultural expert", desc: "You clearly know your stuff. You're in the top tier of cultural awareness — the kind of teacher who sees what others miss.", color: "var(--teal-bright)" };
    if (s >= 7) return { title: "Culturally sharp", desc: "Strong instincts. You caught most of the counterintuitive ones. A few blind spots remain — the research might surprise you.", color: "var(--teal-bright)" };
    if (s >= 5) return { title: "Culturally curious", desc: "You're asking the right questions, but some common assumptions tripped you up. That's normal — most of these findings challenge what teacher training covers.", color: "var(--gold-bright)" };
    if (s >= 3) return { title: "Room to grow", desc: "A lot of this runs counter to what most teachers learn in training. The good news: awareness is the first step, and the research behind these answers is genuinely fascinating.", color: "var(--gold-bright)" };
    return { title: "Starting the journey", desc: "These results are more common than you'd think — most people score below 50%. Culture shapes the classroom in ways that aren't intuitive.", color: "var(--red)" };
  }

  // ── Render: Results ───────────────────────────────────────────────────
  function renderResults() {
    const tier = getResultTier(score);
    const pct = Math.round((score / questions.length) * 100);
    const circ = 2 * Math.PI * 54;
    const offset = circ - (pct / 100) * circ;
    const ringColor = pct >= 70 ? "var(--teal-bright)" : pct >= 40 ? "var(--gold-bright)" : "var(--red)";

    const shareText = encodeURIComponent("I scored " + score + "/10 on the Culture Quiz — how well do you know how culture shapes the classroom? 🌍");
    const shareUrl = encodeURIComponent(QUIZ_URL);

    app.innerHTML = `
      <div class="results-screen">
        <div class="results-card">
          <div class="stool-logo" style="margin-bottom:1.25rem">
            ${STOOL_SVG_SM}
            <span class="wordmark" style="font-size:.95rem">stool culture quiz</span>
          </div>

          <div class="score-ring">
            <svg viewBox="0 0 124 124" width="130" height="130">
              <circle class="track" cx="62" cy="62" r="54"></circle>
              <circle class="fill-ring" cx="62" cy="62" r="54"
                stroke="${ringColor}"
                stroke-dasharray="${circ}"
                stroke-dashoffset="${offset}">
              </circle>
            </svg>
            <div class="score-number">
              <span class="big" style="color:${ringColor}">${score}/${questions.length}</span>
              <span class="label">Score</span>
            </div>
          </div>

          <h2 class="result-title" style="color:${tier.color}">${tier.title}</h2>
          <p class="result-desc">${tier.desc}</p>

          <div class="cta-block">
            <div class="cta-stool-icon">${STOOL_SVG_LG}</div>
            <div class="cta-text">
              <strong style="color:var(--ink)">stool</strong> gives you country-by-country classroom insights, a cultural research library, and practical tools — built specifically for teachers in international schools.
            </div>
            <div class="cta-features">
              <span class="cta-feature"><span class="dot" style="background:#1D9E75"></span> School</span>
              <span class="cta-feature"><span class="dot" style="background:#534AB7"></span> Place</span>
              <span class="cta-feature"><span class="dot" style="background:#BA7517"></span> Package</span>
              <span class="cta-feature" style="color:var(--ink-4)">&middot; 600+ real salary records &middot; Free</span>
            </div>
            <a href="${SITE_URL}" target="_blank" class="btn-primary" style="text-decoration:none;width:100%">
              Explore mystool.org &rarr;
            </a>
          </div>

          <div class="share-row">
            <a href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}" target="_blank" class="btn-ghost">Share on X</a>
            <a href="https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}" target="_blank" class="btn-ghost">Share on LinkedIn</a>
            <a href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}&quote=${shareText}" target="_blank" class="btn-ghost">Share on Facebook</a>
            <button class="btn-ghost" id="copyBtn">Copy link</button>
          </div>
        </div>

        <button class="btn-secondary" id="reviewToggle" style="margin-bottom:.5rem">Review your answers ▾</button>
        <div id="reviewPanel" style="display:none" class="review-panel"></div>

        <div style="margin-top:1rem">
          <button class="btn-ghost" id="retakeBtn">↻ Take it again</button>
        </div>

        <div class="branding">
          ${STOOL_SVG_SM}
          <span>Honest intelligence for international educators &middot; <a href="${SITE_URL}" target="_blank">mystool.org</a></span>
        </div>
      </div>
    `;

    // Wire buttons
    document.getElementById("copyBtn").addEventListener("click", function() {
      navigator.clipboard.writeText(QUIZ_URL).then(() => {
        this.textContent = "Copied!";
        setTimeout(() => { this.textContent = "Copy link"; }, 2000);
      }).catch(() => { this.textContent = "Copy failed"; });
    });

    document.getElementById("retakeBtn").addEventListener("click", renderStart);

    const reviewToggle = document.getElementById("reviewToggle");
    const reviewPanel = document.getElementById("reviewPanel");
    let reviewOpen = false;

    reviewToggle.addEventListener("click", () => {
      reviewOpen = !reviewOpen;
      reviewToggle.textContent = reviewOpen ? "Hide answers ▴" : "Review your answers ▾";
      if (reviewOpen) {
        reviewPanel.style.display = "block";
        reviewPanel.innerHTML = results.map((r, i) =>
          '<div class="review-item">' +
            '<div class="q-text">' + (i + 1) + '. ' + r.question + '</div>' +
            '<div class="q-result ' + (r.correct ? 'correct' : 'wrong') + '">' +
              (r.correct ? '✓ Correct' : '✗ Incorrect') +
            '</div>' +
          '</div>'
        ).join("");
      } else {
        reviewPanel.style.display = "none";
      }
    });
  }

  // ── Go ─────────────────────────────────────────────────────────────────
  renderStart();

})();
</script>
</body>
</html>
